name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [10, 11, 12]
        stability: [prefer-lowest, prefer-stable]
        exclude:
          - php: 8.2
            laravel: 12
          - php: 8.4
            laravel: 10

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} (${{ matrix.stability }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2
          ini-values: error_reporting=8191

      - name: Install dependencies
        run: |
          composer require \
            "illuminate/support:^${{ matrix.laravel }}" \
            "illuminate/http:^${{ matrix.laravel }}" \
            "illuminate/database:^${{ matrix.laravel }}" \
            "illuminate/notifications:^${{ matrix.laravel }}" \
            "illuminate/queue:^${{ matrix.laravel }}" \
            "illuminate/events:^${{ matrix.laravel }}" \
            --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: php -d error_reporting="E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED" vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run tests
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  release:
    needs: tests
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
